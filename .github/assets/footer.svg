<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 900 120"
     width="900"
     height="120">

    <defs>

        <!-- Background -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FBF8F3"/>
            <stop offset="100%" stop-color="#F5F1EA"/>
        </linearGradient>

        <!-- Accent -->
        <linearGradient id="accent" x1="0%" x2="100%">
            <stop offset="0%" stop-color="#C96C3B"/>
            <stop offset="100%" stop-color="#DE8454"/>
        </linearGradient>

        <!-- Shadow -->
        <filter id="shadow"
                x="-20%"
                y="-20%"
                width="140%"
                height="140%">

            <feDropShadow
                dx="0"
                dy="6"
                stdDeviation="10"
                flood-color="#000"
                flood-opacity="0.08"/>

        </filter>

        <!-- Clip -->
        <clipPath id="cardClip">

            <rect
                x="40"
                y="20"
                width="820"
                height="80"
                rx="22"/>

        </clipPath>

    </defs>

    <!-- Card -->

    <rect
        x="40"
        y="20"
        width="820"
        height="80"
        rx="22"
        fill="url(#bg)"
        stroke="#DDD5CB"
        stroke-width="1.2"
        filter="url(#shadow)"/>

    <!-- Animated top highlight -->

    <g clip-path="url(#cardClip)">

        <rect
            x="-200"
            y="20"
            width="180"
            height="2"
            fill="url(#accent)"
            opacity="0.9">

            <animate
                attributeName="x"
                values="-200;920"
                dur="8s"
                repeatCount="indefinite"/>

        </rect>

    </g>

    <!-- Quote -->

    <text
        x="450"
        y="53"
        text-anchor="middle"
        font-family="Inter,Segoe UI,Arial"
        font-size="17"
        fill="#2E2A27">

        Building AI that people can trust.

    </text>

    <!-- Divider -->

    <line
        x1="345"
        y1="69"
        x2="555"
        y2="69"
        stroke="#DDD5CB"
        stroke-width="1"/>

    <!-- Animated Dot -->

    <circle
        cx="345"
        cy="69"
        r="3"
        fill="#C96C3B">

        <animate
            attributeName="cx"
            values="345;555;345"
            dur="6s"
            repeatCount="indefinite"/>

    </circle>

    <!-- Signature -->

    <text
        x="450"
        y="88"
        text-anchor="middle"
        font-family="Inter,Segoe UI,Arial"
        font-size="11"
        letter-spacing="3"
        fill="#8A8076">

        ANUJ WANKHEDE

    </text>

</svg>
