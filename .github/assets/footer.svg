<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 100" width="900">

  <defs>

    <!-- GLASS BACKGROUND -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2"/>
    </linearGradient>

    <!-- BORDER GLOW -->
    <linearGradient id="border" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>

    <!-- TEXT GRADIENT -->
    <linearGradient id="text" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#007CF0"/>
      <stop offset="100%" stop-color="#00D4FF"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- BLUR (GLASS EFFECT) -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <!-- SHADOW -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>

  </defs>

  <!-- GLASS CARD -->
  <rect x="50" y="10" width="800" height="80" rx="18"
        fill="url(#bg)"
        stroke="url(#border)"
        stroke-width="1.2"
        filter="url(#shadow)"/>

  <!-- TOP GLOW LINE -->
  <rect x="-200" y="10" width="200" height="2" fill="#00D4FF" opacity="0.6">
    <animate attributeName="x" from="-200" to="900" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- FLOATING PARTICLES -->
  <g fill="#00D4FF" opacity="0.3">
    <circle cx="120" cy="40" r="2">
      <animate attributeName="cy" values="40;30;40" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="60" r="2">
      <animate attributeName="cy" values="60;50;60" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- TYPING TEXT MASK -->
  <mask id="typingMask">
    <rect x="150" y="35" width="0" height="30" fill="white">
      <animate attributeName="width" from="0" to="600" dur="4s" fill="freeze"/>
    </rect>
  </mask>

  <!-- QUOTE WITH TYPING -->
  <text x="450" y="55"
        font-family="Segoe UI, Arial"
        font-size="14"
        text-anchor="middle"
        fill="url(#text)"
        mask="url(#typingMask)">
    Built with code, curiosity, and the need to explain every prediction.
  </text>

  <!-- BLINKING CURSOR -->
  <rect x="750" y="40" width="2" height="18" fill="#00D4FF">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- SUBTEXT -->
  <text x="450" y="72"
        font-family="Segoe UI, Arial"
        font-size="10"
        text-anchor="middle"
        fill="#00D4FF"
        letter-spacing="3"
        opacity="0.7">
    ANUJ WANKHEDE · VIT PUNE · 2026
  </text>

</svg>
