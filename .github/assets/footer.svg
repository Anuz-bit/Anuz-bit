<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 110" width="900" height="110">

  <defs>

    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#F6F3EE"/>
    </linearGradient>

    <!-- Accent -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#C46A3A"/>
      <stop offset="100%" stop-color="#D97C4A"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6"
        flood-color="#000"
        flood-opacity="0.08"/>
    </filter>

  </defs>

  <!-- Card -->

  <rect
      x="40"
      y="15"
      width="820"
      height="80"
      rx="20"
      fill="url(#bg)"
      stroke="#DDD5CB"
      stroke-width="1"
      filter="url(#shadow)"/>

  <!-- Moving Accent Line -->

  <rect
      x="-180"
      y="15"
      width="180"
      height="2"
      fill="url(#accent)">

      <animate
          attributeName="x"
          values="-180;900;-180"
          dur="9s"
          repeatCount="indefinite"/>

  </rect>

  <!-- Quote -->

  <text
      x="450"
      y="50"
      text-anchor="middle"
      font-family="Inter, Segoe UI, Arial"
      font-size="16"
      fill="#2F2B28">

      Building AI that people can trust.

  </text>

  <!-- Divider -->

  <line
      x1="330"
      y1="64"
      x2="570"
      y2="64"
      stroke="#DDD5CB"
      stroke-width="1"/>

  <!-- Signature -->

  <text
      x="450"
      y="82"
      text-anchor="middle"
      font-family="Inter, Segoe UI, Arial"
      font-size="12"
      letter-spacing="2"
      fill="#8A8076">

      — ANUJ WANKHEDE —

  </text>

  <!-- Accent Dot -->

  <circle
      cx="330"
      cy="64"
      r="2.8"
      fill="#C46A3A">

      <animate
          attributeName="cx"
          values="330;570;330"
          dur="8s"
          repeatCount="indefinite"/>

  </circle>

</svg>
