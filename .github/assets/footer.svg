<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 100" width="900">

  <defs>
    <!-- DARK BG -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#010409"/>
      <stop offset="100%" stop-color="#020d1a"/>
    </linearGradient>

    <!-- GLOW LINE -->
    <linearGradient id="gline" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>

    <!-- TEXT SHIMMER -->
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#8B949E"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#8B949E"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- SOFT SHADOW -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>

  </defs>

  <!-- BG -->
  <rect width="900" height="100" fill="url(#bg)"/>

  <!-- TOP SCAN LINE (ANIMATED) -->
  <rect x="-200" y="0" width="200" height="3" fill="#00D4FF" opacity="0.7">
    <animate attributeName="x" from="-200" to="900" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- STATIC GLOW -->
  <rect x="0" y="0" width="900" height="2" fill="url(#gline)" opacity="0.4"/>

  <!-- CORNERS -->
  <g stroke="#00D4FF" stroke-width="1.8" stroke-opacity="0.6">
    <line x1="18" y1="18" x2="55" y2="18"/>
    <line x1="18" y1="18" x2="18" y2="55"/>
    <circle cx="18" cy="18" r="2.5" fill="#00D4FF"/>

    <line x1="882" y1="18" x2="845" y2="18"/>
    <line x1="882" y1="18" x2="882" y2="55"/>
    <circle cx="882" cy="18" r="2.5" fill="#00D4FF"/>
  </g>

  <!-- FLOATING DOTS -->
  <g fill="#00D4FF" opacity="0.4">
    <circle cx="60" cy="70" r="2">
      <animate attributeName="cy" values="70;60;70" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="840" cy="70" r="2">
      <animate attributeName="cy" values="70;60;70" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="50" r="1.2">
      <animate attributeName="cy" values="50;40;50" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="50" r="1.2">
      <animate attributeName="cy" values="50;40;50" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- CENTER GLOW -->
  <ellipse cx="450" cy="50" rx="250" ry="30" fill="#00D4FF" opacity="0.05">
    <animate attributeName="rx" values="240;270;240" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- QUOTE -->
  <text x="450" y="54"
        font-family="Segoe UI, Arial"
        font-size="13"
        text-anchor="middle"
        font-style="italic"
        fill="url(#textGlow)"
        filter="url(#shadow)">
    Built with code, curiosity, and the need to explain every prediction.
  </text>

  <!-- SUB LABEL -->
  <text x="450" y="76"
        font-family="Segoe UI, Arial"
        font-size="10"
        text-anchor="middle"
        fill="#00D4FF"
        letter-spacing="3"
        opacity="0.7">
    ANUJ WANKHEDE · VIT PUNE · 2025
  </text>

</svg>
