<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 900 220"
     width="900"
     height="220">

    <defs>

        <!-- Background -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FBF8F3"/>
            <stop offset="100%" stop-color="#F5F1EA"/>
        </linearGradient>

        <!-- Accent -->
        <linearGradient id="accent" x1="0%" x2="100%">
            <stop offset="0%" stop-color="#C96C3B"/>
            <stop offset="100%" stop-color="#DE8454"/>
        </linearGradient>

        <!-- Soft Shadow -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12"
                flood-color="#000000"
                flood-opacity="0.08"/>
        </filter>

        <!-- Rounded clipping -->
        <clipPath id="cardClip">
            <rect
                x="20"
                y="20"
                width="860"
                height="180"
                rx="26"/>
        </clipPath>

    </defs>

    <!-- Card -->

    <rect
        x="20"
        y="20"
        width="860"
        height="180"
        rx="26"
        fill="url(#bg)"
        stroke="#DDD5CB"
        stroke-width="1.2"
        filter="url(#shadow)"/>

    <!-- Animated top highlight -->

    <g clip-path="url(#cardClip)">

        <rect
            x="-220"
            y="20"
            width="180"
            height="2"
            fill="url(#accent)"
            opacity="0.9">

            <animate
                attributeName="x"
                values="-220;940"
                dur="7s"
                repeatCount="indefinite"/>

        </rect>

    </g>

    <!-- Small Heading -->

    <text
        x="450"
        y="72"
        text-anchor="middle"
        font-family="Inter,Segoe UI,Arial"
        font-size="12"
        letter-spacing="4"
        fill="#8A8076">

        AGENTIC AI DEVELOPER

    </text>

    <!-- Name -->

    <text
        x="450"
        y="118"
        text-anchor="middle"
        font-family="Inter,Segoe UI,Arial"
        font-size="50"
        font-weight="700"
        fill="#2E2A27">

        Anuj Wankhede

    </text>

    <!-- Subtitle -->

    <text
        x="450"
        y="150"
        text-anchor="middle"
        font-family="Inter,Segoe UI,Arial"
        font-size="17"
        fill="#6C645D">

        Building trustworthy Agentic AI systems.

    </text>

    <!-- Divider -->

    <line
        x1="360"
        y1="173"
        x2="540"
        y2="173"
        stroke="#D8CEC3"
        stroke-width="1"/>

    <!-- Animated dot -->

    <circle
        cx="360"
        cy="173"
        r="3"
        fill="#C96C3B">

        <animate
            attributeName="cx"
            values="360;540;360"
            dur="6s"
            repeatCount="indefinite"/>

    </circle>

</svg>
