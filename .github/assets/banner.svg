<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">

  <defs>

    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#F6F3EE"/>
    </linearGradient>

    <!-- Accent -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#C46A3A"/>
      <stop offset="100%" stop-color="#D97C4A"/>
    </linearGradient>

    <!-- Border Animation -->
    <linearGradient id="line" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#DDD5CB"/>
      <stop offset="50%" stop-color="#C46A3A"/>
      <stop offset="100%" stop-color="#DDD5CB"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8"
        flood-color="#000000"
        flood-opacity="0.08"/>
    </filter>

  </defs>

  <!-- Card -->

  <rect
      x="20"
      y="20"
      width="860"
      height="180"
      rx="26"
      fill="url(#bg)"
      stroke="#DDD5CB"
      stroke-width="1.2"
      filter="url(#shadow)"/>

  <!-- Animated Accent Line -->

  <rect
      x="-200"
      y="20"
      width="180"
      height="2"
      fill="url(#accent)"
      opacity="0.9">

      <animate
        attributeName="x"
        values="-200;920;-200"
        dur="8s"
        repeatCount="indefinite"/>

  </rect>

  <!-- Decorative line -->

  <line
      x1="370"
      y1="58"
      x2="530"
      y2="58"
      stroke="#C46A3A"
      stroke-width="2">

      <animate
        attributeName="stroke-opacity"
        values="0.4;1;0.4"
        dur="5s"
        repeatCount="indefinite"/>

  </line>

  <!-- Small Label -->

  <text
      x="450"
      y="82"
      text-anchor="middle"
      font-family="Inter, Segoe UI, Arial"
      font-size="12"
      fill="#8B7F73"
      letter-spacing="4">

      AGENTIC AI DEVELOPER

  </text>

  <!-- Name -->

  <text
      x="450"
      y="125"
      text-anchor="middle"
      font-family="Inter, Segoe UI, Arial"
      font-size="50"
      font-weight="700"
      fill="#2F2B28">

      Anuj Wankhede

  </text>

  <!-- Subtitle -->

  <text
      x="450"
      y="155"
      text-anchor="middle"
      font-family="Inter, Segoe UI, Arial"
      font-size="17"
      fill="#6A625A">

      Building trustworthy Agentic AI systems.

  </text>

  <!-- Bottom Divider -->

  <line
      x1="300"
      y1="178"
      x2="600"
      y2="178"
      stroke="#DDD5CB"
      stroke-width="1"/>

  <!-- Animated Accent Dot -->

  <circle
      cx="300"
      cy="178"
      r="3"
      fill="#C46A3A">

      <animate
          attributeName="cx"
          values="300;600;300"
          dur="7s"
          repeatCount="indefinite"/>

  </circle>

</svg>
