<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900">

  <defs>

    <!-- GLASS BG -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2"/>
    </linearGradient>

    <!-- BORDER -->
    <linearGradient id="border" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>

    <!-- TEXT GRADIENT -->
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#007CF0"/>
      <stop offset="100%" stop-color="#00D4FF"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- SOFT SHADOW -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.15"/>
    </filter>

  </defs>

  <!-- GLASS CONTAINER -->
  <rect x="30" y="20" width="840" height="180" rx="24"
        fill="url(#bg)"
        stroke="url(#border)"
        stroke-width="1.5"
        filter="url(#shadow)"/>

  <!-- SCANNING LIGHT -->
  <rect x="-200" y="20" width="200" height="3" fill="#00D4FF" opacity="0.6">
    <animate attributeName="x" from="-200" to="900" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- AMBIENT GLOW -->
  <ellipse cx="450" cy="100" rx="300" ry="80" fill="#00D4FF" opacity="0.05">
    <animate attributeName="rx" values="280;320;280" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- FLOATING PARTICLES -->
  <g fill="#00D4FF" opacity="0.3">
    <circle cx="120" cy="60" r="2">
      <animate attributeName="cy" values="60;45;60" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="150" r="2">
      <animate attributeName="cy" values="150;130;150" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- NAME -->
  <text x="450" y="95"
        font-family="Segoe UI, Arial"
        font-size="52"
        font-weight="700"
        text-anchor="middle"
        fill="url(#textGlow)">
    Anuj Wankhede
  </text>

  <!-- TAGLINE -->
  <text x="450" y="125"
        font-family="Segoe UI, Arial"
        font-size="13"
        text-anchor="middle"
        fill="#00D4FF"
        letter-spacing="4"
        opacity="0.85">
    BUILDING AI THAT EARNS TRUST · NOT JUST ACCURACY
  </text>

  <!-- FLOATING PILLS -->
  <g font-family="Arial" font-size="11" font-weight="700" text-anchor="middle">

    <g transform="translate(250,160)">
      <rect x="-55" y="-13" width="110" height="26" rx="13" fill="#ffffff" opacity="0.7"/>
      <animateTransform attributeName="transform" type="translate"
        values="250,160;250,150;250,160" dur="4s" repeatCount="indefinite"/>
      <text y="4" fill="#00D4FF">9.2 GPA</text>
    </g>

    <g transform="translate(400,160)">
      <rect x="-55" y="-13" width="110" height="26" rx="13" fill="#ffffff" opacity="0.7"/>
      <animateTransform attributeName="transform" type="translate"
        values="400,160;400,150;400,160" dur="5s" repeatCount="indefinite"/>
      <text y="4" fill="#F59E0B">Patent Filed</text>
    </g>

    <g transform="translate(550,160)">
      <rect x="-60" y="-13" width="120" height="26" rx="13" fill="#ffffff" opacity="0.7"/>
      <animateTransform attributeName="transform" type="translate"
        values="550,160;550,150;550,160" dur="4.5s" repeatCount="indefinite"/>
      <text y="4" fill="#10B981">2× Published</text>
    </g>

  </g>

</svg>
