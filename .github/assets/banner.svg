<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900">

  <defs>
    <!-- LIGHT BACKGROUND -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f7fa"/>
    </linearGradient>

    <!-- TEXT GRADIENT -->
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#007CF0"/>
      <stop offset="100%" stop-color="#00D4FF"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- GLOW -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- SHADOW FOR 3D -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>

  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="220" fill="url(#bg)"/>

  <!-- FLOATING PARTICLES -->
  <g fill="#00D4FF" opacity="0.4">
    <circle cx="100" cy="50" r="3">
      <animate attributeName="cy" values="50;30;50" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="150" r="2">
      <animate attributeName="cy" values="150;120;150" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="60" r="3">
      <animate attributeName="cy" values="60;30;60" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="170" r="2">
      <animate attributeName="cy" values="170;140;170" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- CENTER GLOW -->
  <ellipse cx="450" cy="110" rx="280" ry="70" fill="#00D4FF" opacity="0.08">
    <animate attributeName="rx" values="260;300;260" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- NAME -->
  <text x="450" y="95"
        font-family="Segoe UI, Arial"
        font-size="54"
        font-weight="700"
        text-anchor="middle"
        fill="url(#textGlow)"
        filter="url(#shadow)">
    Anuj Wankhede
  </text>

  <!-- TAGLINE -->
  <text x="450" y="125"
        font-family="Segoe UI, Arial"
        font-size="13"
        text-anchor="middle"
        fill="#007CF0"
        letter-spacing="3"
        opacity="0.9">
    BUILDING AI THAT EARNS TRUST · NOT JUST ACCURACY
  </text>

  <!-- FLOATING PILLS (3D EFFECT) -->
  <g font-family="Arial" font-size="11" font-weight="700" text-anchor="middle">

    <g transform="translate(200,160)">
      <rect x="-50" y="-13" width="100" height="26" rx="13" fill="#e6faff" filter="url(#shadow)">
        <animateTransform attributeName="transform" type="translate"
          values="200,160;200,155;200,160" dur="4s" repeatCount="indefinite"/>
      </rect>
      <text y="4" fill="#00D4FF">9.2 / 10 GPA</text>
    </g>

    <g transform="translate(320,160)">
      <rect x="-50" y="-13" width="100" height="26" rx="13" fill="#fff3e0" filter="url(#shadow)">
        <animateTransform attributeName="transform" type="translate"
          values="320,160;320,155;320,160" dur="5s" repeatCount="indefinite"/>
      </rect>
      <text y="4" fill="#F59E0B">Patent Filed</text>
    </g>

    <g transform="translate(450,160)">
      <rect x="-55" y="-13" width="110" height="26" rx="13" fill="#e8fff3" filter="url(#shadow)">
        <animateTransform attributeName="transform" type="translate"
          values="450,160;450,155;450,160" dur="4.5s" repeatCount="indefinite"/>
      </rect>
      <text y="4" fill="#10B981">2× Published</text>
    </g>

    <g transform="translate(600,160)">
      <rect x="-60" y="-13" width="120" height="26" rx="13" fill="#f3f0ff" filter="url(#shadow)">
        <animateTransform attributeName="transform" type="translate"
          values="600,160;600,155;600,160" dur="5.5s" repeatCount="indefinite"/>
      </rect>
      <text y="4" fill="#7C3AED">MSEDCL · Govt.</text>
    </g>

  </g>

  <!-- MOVING LIGHT LINE -->
  <rect x="-200" y="210" width="200" height="3" fill="#00D4FF" opacity="0.5">
    <animate attributeName="x" from="-200" to="900" dur="3s" repeatCount="indefinite"/>
  </rect>

</svg>
